<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Support Engineer Portfolio</title>
    <style>
        body {
            font-family: Apotos, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #ffffff;
        }

        .counter-box {
            background: rgb(0, 148, 253);
            padding: 20px;
            display: inline-block;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(246, 156, 2, 0.961);
        }

        #counter {
            font-size: 2rem;
            font-weight: bold;
            color: #ff9500;
        }
    </style>
</head>
<body>
    <h1>Marshaun Hoskins - The start to becoming a Cloud Support Engineer.</h1>
    <p>Welcome to my cloud project site hosted on Azure Static Web Apps!
        This is the first project I have created to showcase my skills and experience in cloud computing.
    </p>

    <div class="counter-box">
        <p>Visitor Count:</p>
        <div id="counter">Loading...</div>
    </div>

    <script>
        fetch('/api/visitor-counter')
            .then(response => response.json())
            .then(data => {
                document.getElementById('counter').textContent = data.count;
            })
            .catch(error => {
                console.error('Error fetching visitor count:', error);
                document.getElementById('counter').textContent = 'Error loading count';
            });
    </script>
</body>
</html>
